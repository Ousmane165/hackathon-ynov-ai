<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechCorp AI Chat - Phi-3.5-Financial</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <section class="hero">
      <div>
        <p class="badge">TechCorp Industries</p>
        <h1>Phi-3.5-Financial Chat</h1>
        <p>Interface web professionnelle pour interagir avec le modèle financier via Ollama.</p>
      </div>
      <div class="status" id="status">Vérification...</div>
    </section>

    <section class="chat-card">
      <div id="chat" class="chat">
        <div class="message assistant">
          Bonjour, je suis l'assistant financier TechCorp. Pose-moi une question business, finance ou risque d'entreprise.
        </div>
      </div>
      <form id="chat-form" class="form">
        <textarea id="message" placeholder="Exemple : Analyse les risques d'une entreprise avec forte croissance et faible trésorerie..." required></textarea>
        <button type="submit">Envoyer</button>
      </form>
    </section>
  </main>
  <script src="/static/main.js"></script>
</body>
</html>
